  #     PGADMIN_DEFAULT_EMAIL: admin@horizonhub.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
    name: horizonhub_postgres_data
